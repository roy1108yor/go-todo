<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.0/css/bootstrap.min.css"
          integrity="sha384-SI27wrMjH3ZZ89r4o+fGIJtnzkAnFs3E4qz9DIYioCQ5l9Rd/7UAa8DHcaL8jkWt" crossorigin="anonymous">
    <title>Todo</title>
    <style>
        .edit-mode {
            display: none;
        }
        .editing .edit-mode {
            display: inline-block;
        }
        .editing .view-mode {
            display: none;
        }
        body { 
            background: linear-gradient(to bottom, #90EE90, #006400); 
            padding-top: 80px; /* Add padding to avoid overlap with fixed header */
        }
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(255, 255, 255, 0.9); /* Slightly transparent white */
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid #dee2e6;
            min-height: 60px;
        }
        .app-header h1 {
            color: green;
            margin: 0; /* Reset margin for h1 inside header */
        }
        .user-info {
            display: flex;
            align-items: center;
        }
        .user-info span {
            margin-right: 15px;
            font-weight: bold;
        }
        .user-info .btn-logout {
             /* Add custom styles if needed */
        }
    </style>
</head>

<body>
    <div class="app-header">
        <h1>Todos</h1>
        {{if .User.ID}}
        <div class="user-info">
            <span>Welcome, {{.User.Username}}!</span>
            <a href="/logout"><button class="btn btn-outline-danger btn-sm btn-logout">Logout</button></a>
        </div>
        {{end}}
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">Add a task</div>
            <div class="card-body">
                <form action="/add" method="post">
                    <div class="form-group">
                        <label for="Item">Item</label>
                        <input type="text" class="form-control" name="item" placeholder="What do you want to do?">
                        <small class="form-text text-muted">Enter what you want to procastinate 🙂</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>
    </div>
    &nbsp;
    &nbsp;
    <div class="container">
        <div class="card">
            <div class="card-header">Tasks</div>
            <div class="card-body">
                <table class="table table-borderless">
                    <thead>
                    <tr>
                        <th scope="col">Item</th>
                        <th scope="col">创建时间</th>
                        <th scope="col">Status</th>
                        <th scope="col">Action</th>
                    </tr>
                    </thead>
                    <tbody>
                    {{range .Todos}}
                        {{if .Completed}}
                            <tr>
                                <td><strike>{{.Item}}</strike></td>
                                <td>{{.FormatCreatedAt}}</td>
                                <td>Completed</td>
                                <td>
                                    <button class="btn btn-primary" disabled>Complete</button>
                                    <button class="btn btn-danger" disabled>Delete</button>
                                </td>
                            </tr>
                        {{else}}
                            <tr data-id="{{ .Id}}">
                                <td>
                                    <span class="view-mode">{{.Item}}</span>
                                    <div class="edit-mode">
                                        <input type="text" class="form-control todo-edit-input" value="{{.Item}}">
                                    </div>
                                </td>
                                <td>{{.FormatCreatedAt}}</td>
                                <td>Not Completed</td>
                                <td>
                                    <div class="view-mode">
                                        <a href="/complete/{{ .Id}}"><button class="btn btn-primary">Complete</button></a>
                                        <button class="btn btn-warning edit-btn" onclick="handleEdit({{ .Id}})">Edit</button>
                                        <a href="/delete/{{ .Id}}"><button class="btn btn-danger">Delete</button></a>
                                    </div>
                                    <div class="edit-mode">
                                        <button class="btn btn-success save-btn" onclick="saveEdit({{ .Id}})">Save</button>
                                        <button class="btn btn-secondary cancel-btn" onclick="cancelEdit({{ .Id}})">Cancel</button>
                                    </div>
                                </td>
                            </tr>
                        {{end}}
                    {{end}}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Track the current editing row
        let currentEditingId = null;

        // Handle edit button click
        function handleEdit(id) {
            // Cancel any previous edit in progress
            if (currentEditingId !== null && currentEditingId !== id) {
                cancelEdit(currentEditingId);
            }

            // Set current editing id
            currentEditingId = id;
            
            // Toggle edit mode for the row
            const row = document.querySelector(`tr[data-id="${id}"]`);
            row.classList.add('editing');
            
            // Focus on the input field
            const input = row.querySelector('.todo-edit-input');
            input.focus();
            
            // Position cursor at the end of the text
            const inputLength = input.value.length;
            input.setSelectionRange(inputLength, inputLength);
            
            // Add event listeners for keyboard input
            input.addEventListener('keypress', function(event) {
                if (event.key === 'Enter') {
                    saveEdit(id);
                }
            });
            
            // Add event listener for clicking outside
            document.addEventListener('click', handleOutsideClick);
        }

        // Handle save button click
        function saveEdit(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            const newValue = row.querySelector('.todo-edit-input').value.trim();
            
            // Don't save empty values
            if (newValue === '') {
                cancelEdit(id);
                return;
            }
            
            // Make AJAX request to update the todo
            fetch(`/todos/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    item: newValue
                }),
            })
            .then(response => {
                if (response.ok) {
                    // Update the view with new value
                    row.querySelector('.view-mode').textContent = newValue;
                    
                    // Exit edit mode
                    row.classList.remove('editing');
                    currentEditingId = null;
                    
                    // Remove the outside click handler
                    document.removeEventListener('click', handleOutsideClick);
                } else {
                    // Handle potential errors like unauthorized (401) or forbidden (403)
                    if (response.status === 401 || response.status === 403) {
                         alert('Authentication error. Please log in again.');
                         window.location.href = '/login'; // Redirect to login
                    } else {
                         alert('Failed to update todo. Please try again.');
                         console.error('Failed to update todo');
                         cancelEdit(id); // Revert changes on failure
                    }
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred while saving. Please try again.');
                cancelEdit(id); // Revert changes on network error
            });
        }

        // Handle cancel button click
        function cancelEdit(id) {
            const row = document.querySelector(`tr[data-id="${id}"]`);
            if (!row) return; // Element might have been removed
            
            // Reset input value to original text
            const originalText = row.querySelector('.view-mode').textContent;
            row.querySelector('.todo-edit-input').value = originalText;
            
            // Exit edit mode
            row.classList.remove('editing');
            currentEditingId = null;
            
            // Remove the outside click handler
            document.removeEventListener('click', handleOutsideClick);
        }

        // Handle clicks outside the editing area
        function handleOutsideClick(event) {
            if (currentEditingId !== null) {
                const row = document.querySelector(`tr[data-id="${currentEditingId}"]`);
                // Check if the row still exists and if the click was outside the row
                if (row && !row.contains(event.target)) {
                    cancelEdit(currentEditingId);
                }
            }
        }
    </script>
</body>
</html>
