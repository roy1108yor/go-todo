<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.0/css/bootstrap.min.css"
          integrity="sha384-SI27wrMjH3ZZ89r4o+fGIJtnzkAnFs3E4qz9DIYioCQ5l9Rd/7UAa8DHcaL8jkWt" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <style>
        :root {
            --background: linear-gradient(to bottom, #E6E6FA, #4B0082);
            --text-color: #212529;
            --heading-color: #000000;
            --card-bg: #fff;
            --card-header: #f8f9fa;
            --border-color: #dee2e6;
            --btn-primary-bg: #007bff;
            --btn-primary-color: #fff;
            --btn-danger-bg: #dc3545;
            --btn-danger-color: #fff;
        }
        
        .dark-theme {
            --background: linear-gradient(to bottom, #1a1a2e, #16213e);
            --text-color: #e1e1e1;
            --heading-color: #ffffff;
            --card-bg: #2a2a3c;
            --card-header: #16213e;
            --border-color: #444;
            --btn-primary-bg: #3282b8;
            --btn-primary-color: #fff;
            --btn-danger-bg: #c23616;
            --btn-danger-color: #fff;
        }
        
        body {
            background: var(--background);
            min-height: 100vh;
            color: var(--text-color);
            transition: all 0.3s ease;
        }
        
        .card {
            background-color: var(--card-bg);
            border-color: var(--border-color);
            transition: all 0.3s ease;
            margin-top: 20px;
        }
        
        .card-header {
            background-color: var(--card-header);
            border-color: var(--border-color);
        }
        
        h1 {
            color: var(--heading-color);
            text-align: center;
            padding: 20px;
            font-weight: bold;
        }
        
        .theme-toggle-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        
        .theme-toggle {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 42px;
            height: 42px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .theme-toggle:hover {
            transform: scale(1.1);
        }
        
        .theme-toggle i {
            font-size: 20px;
            color: var(--text-color);
        }
    </style>
</head>
<body>
    <div class="theme-toggle-container">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <h1>My Tasks</h1>

    <div class="container">
        <div class="card">
            <div class="card-header">Add a task</div>
            <div class="card-body">
                <form action="/add" method="post" id="todoForm">
                    <div class="form-group">
                        <label for="Item">Item</label>
                        <input type="text" class="form-control" name="item" id="itemInput" required placeholder="What do you want to do?">
                        <small class="form-text text-muted">Enter your task here</small>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Task</button>
                </form>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="card-header">My Task List</div>
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th scope="col">Task</th>
                            <th scope="col">Status</th>
                            <th scope="col">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="taskList">
                        <!-- Task items would be populated here -->
                        <tr>
                            <td>Complete project documentation</td>
                            <td>Not Completed</td>
                            <td>
                                <button class="btn btn-primary btn-sm">Complete</button>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </td>
                        </tr>
                        <tr>
                            <td><strike>Create initial wireframes</strike></td>
                            <td>Completed</td>
                            <td>
                                <button class="btn btn-primary btn-sm" disabled>Complete</button>
                                <button class="btn btn-danger btn-sm">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // Theme toggle functionality
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = themeToggle.querySelector('i');
        
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            } else {
                document.body.classList.remove('dark-theme');
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            }
            localStorage.setItem('theme', theme);
        }
        
        function toggleTheme() {
            if (document.body.classList.contains('dark-theme')) {
                setTheme('light');
            } else {
                setTheme('dark');
            }
        }
        
        // Apply saved theme or default to light
        const savedTheme = localStorage.getItem('theme') || 'light';
        setTheme(savedTheme);
        
        // Add event listener to toggle button
        themeToggle.addEventListener('click', toggleTheme);
    </script>
</body>
</html>
